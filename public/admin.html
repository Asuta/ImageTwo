<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image2 运营后台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="admin-panel is-standalone" aria-label="运营后台">
      <div class="admin-shell">
        <header class="admin-header">
          <div>
            <p class="eyebrow">运营后台</p>
            <h1>卡密与供应商</h1>
          </div>
          <div class="admin-header-actions">
            <a class="soft-button" href="/">返回前台</a>
            <button id="adminLogoutButton" class="soft-button" type="button">退出后台</button>
          </div>
        </header>

        <div class="admin-layout">
          <section class="admin-card admin-card-wide">
            <div class="admin-card-head">
              <div>
                <h2>供应商配置</h2>
                <p>这里管理当前启用的图片服务商，以及 OpenAI Response / Compilation 两种接口格式。</p>
              </div>
              <div class="admin-header-actions">
                <button id="providerReloadButton" class="soft-button" type="button">刷新供应商</button>
              </div>
            </div>

            <div class="provider-summary" id="providerSummary">
              <strong>当前启用：-</strong>
              <span>请先配置至少一个供应商。</span>
            </div>

            <div class="provider-grid">
              <form id="providerForm" class="admin-form provider-form">
                <input id="providerId" type="hidden" />
                <label class="provider-wide">
                  <span>供应商名称</span>
                  <input id="providerLabel" type="text" placeholder="例如：百拉图主服务" required />
                </label>
                <label class="provider-wide">
                  <span>API 地址</span>
                  <input id="providerApiUrl" type="url" placeholder="https://api.example.com/v1/chat/completions" required />
                </label>
                <label>
                  <span>API Key</span>
                  <input id="providerApiKey" type="text" placeholder="留空则沿用全局密钥" />
                </label>
                <label>
                  <span>模型名</span>
                  <input id="providerModel" type="text" placeholder="gpt-image-2" required />
                </label>
                <label>
                  <span>接口格式</span>
                  <select id="providerApiFormat">
                    <option value="compilation">Compilation</option>
                    <option value="responses">OpenAI Response</option>
                  </select>
                </label>
                <label class="provider-switch">
                  <span>状态</span>
                  <input id="providerEnabled" type="checkbox" checked />
                  <span>启用</span>
                </label>
                <label class="provider-wide">
                  <span>备注</span>
                  <input id="providerNote" type="text" placeholder="切换原因、限流说明、故障备注等" />
                </label>
                <div class="provider-actions provider-wide">
                  <button id="providerSaveButton" class="generate-button admin-submit" type="submit">
                    <span aria-hidden="true">＋</span>
                    <span>创建供应商</span>
                  </button>
                  <button id="providerResetButton" class="soft-button" type="button">清空表单</button>
                  <button id="providerTestButton" class="soft-button" type="button">测试连接</button>
                </div>
              </form>

              <div class="provider-list-wrap">
                <div class="provider-list-head">
                  <strong>供应商列表</strong>
                  <span>启用、切换、测试、删除都在这里完成。</span>
                </div>
                <div id="providerList" class="provider-list"></div>
              </div>
            </div>
          </section>

          <section class="admin-card">
            <div class="admin-card-head">
              <div>
                <h2>创建卡密批次</h2>
                <p>明文 Key 只会在创建后显示一次，请及时复制或导出。</p>
              </div>
            </div>

            <form id="giftBatchForm" class="admin-form">
              <label>
                <span>批次名</span>
                <input id="giftBatchLabel" type="text" placeholder="例如：五月推广批次" required />
              </label>
              <label>
                <span>单张额度</span>
                <input id="giftBatchCredits" type="number" min="1" step="1" value="10" required />
              </label>
              <label>
                <span>数量</span>
                <input id="giftBatchCount" type="number" min="1" max="200" step="1" value="5" required />
              </label>
              <label>
                <span>过期时间</span>
                <input id="giftBatchExpiresAt" type="date" />
              </label>
              <label class="admin-form-wide">
                <span>备注</span>
                <input id="giftBatchNote" type="text" placeholder="渠道、订单或售后说明" />
              </label>
              <button id="createGiftBatchButton" class="generate-button admin-submit" type="submit">
                <span aria-hidden="true">＋</span>
                <span>生成批次</span>
              </button>
            </form>

            <div id="createdGiftCards" class="created-cards hidden" aria-label="刚创建的卡密"></div>
          </section>

          <section class="admin-card">
            <div class="admin-card-head">
              <div>
                <h2>批次概览</h2>
                <p>按批次查看 active、redeemed、expired、disabled、revoked 状态。</p>
              </div>
              <button id="refreshAdminButton" class="soft-button" type="button">刷新</button>
            </div>
            <div id="giftBatchList" class="batch-list"></div>
          </section>

          <section class="admin-card admin-card-wide">
            <div class="admin-card-head">
              <div>
                <h2>卡密列表</h2>
                <p>可搜索卡密尾号、批次名或兑换用户 ID。</p>
              </div>
              <div class="admin-filters">
                <input id="giftSearchInput" type="search" placeholder="搜索" />
                <select id="giftStatusFilter">
                  <option value="">全部状态</option>
                  <option value="active">active</option>
                  <option value="redeemed">redeemed</option>
                  <option value="expired">expired</option>
                  <option value="disabled">disabled</option>
                  <option value="revoked">revoked</option>
                </select>
              </div>
            </div>
            <div id="giftCardTable" class="gift-card-table"></div>
          </section>

          <section class="admin-card admin-card-wide">
            <div class="admin-card-head">
              <div>
                <h2>最近审计</h2>
                <p>记录卡密创建、兑换、作废、撤销和额度变化。</p>
              </div>
            </div>
            <div id="auditLogList" class="audit-list"></div>
          </section>
        </div>
      </div>
      <div id="toast" class="toast hidden" role="status"></div>
    </section>

    <script type="module" src="/admin.js?v=20260510-admin-auth"></script>
  </body>
</html>
