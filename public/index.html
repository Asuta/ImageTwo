<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image2 Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="主导航">
        <div class="logo">
          <span class="logo-mark">I2</span>
          <span>Image2</span>
        </div>

        <nav class="nav-stack">
          <button class="nav-item" type="button" title="发现">
            <span aria-hidden="true">⌕</span>
            <span>发现</span>
          </button>
          <button class="nav-item active" type="button" title="生成">
            <span aria-hidden="true">✦</span>
            <span>生成</span>
          </button>
          <button class="nav-item" type="button" title="资产">
            <span aria-hidden="true">▣</span>
            <span>资产</span>
          </button>
          <button class="nav-item" type="button" title="历史">
            <span aria-hidden="true">◷</span>
            <span>历史</span>
          </button>
        </nav>

        <div class="nav-footer">
          <button class="icon-button" type="button" title="API">API</button>
          <button class="icon-button" type="button" title="通知">◌</button>
          <button class="icon-button" type="button" title="菜单">☰</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Image2 Studio</p>
            <h1>生成历史</h1>
          </div>
          <div class="status-pill">
            <span class="status-dot"></span>
            <span>本地服务已连接</span>
          </div>
        </header>

        <section id="historyFeed" class="history-feed" aria-label="生成历史"></section>

        <section id="emptyState" class="empty-state">
          <div class="empty-card">
            <span class="empty-icon">✦</span>
            <h2>开始一次新的图片生成</h2>
            <p>生成后的图片、提示词、参数和参考图会保留在这里，方便你继续编辑和复用。</p>
          </div>
        </section>
      </main>

      <section class="composer" aria-label="生成控制">
        <div class="mode-tabs" role="tablist" aria-label="生成模式">
          <button id="generateMode" class="mode-tab active" type="button" data-mode="generate">
            <span aria-hidden="true">▧</span>
            <span>图片生成</span>
          </button>
          <button id="editMode" class="mode-tab" type="button" data-mode="edit">
            <span aria-hidden="true">◫</span>
            <span>参考图编辑</span>
          </button>
        </div>

        <form id="generateForm" class="composer-card">
          <label id="uploadTile" class="upload-tile" title="上传参考图">
            <input id="referenceInput" type="file" accept="image/*" multiple />
            <span id="uploadIcon" aria-hidden="true">+</span>
          </label>

          <div class="prompt-zone">
            <textarea
              id="prompt"
              name="prompt"
              rows="3"
              placeholder="请输入你的创意，例如：雨后城市里的未来感产品海报，干净构图，高级广告摄影"
              required
            ></textarea>

            <div class="control-row">
              <div class="ratio-control">
                <button id="ratioButton" class="ratio-button" type="button" aria-expanded="false">
                  <span id="ratioIcon" class="ratio-icon auto" aria-hidden="true"></span>
                  <span id="ratioLabel">智能比例</span>
                  <span aria-hidden="true">⌃</span>
                </button>
                <div id="ratioPanel" class="ratio-panel hidden">
                  <p>图片比例</p>
                  <div id="ratioOptions" class="ratio-options" aria-label="图片比例"></div>
                </div>
              </div>

              <select id="quality" name="quality" aria-label="图片质量">
                <option value="medium">medium</option>
                <option value="low">low</option>
                <option value="high">high</option>
              </select>

              <label class="count-control">
                <span>数量</span>
                <input id="countInput" type="number" min="1" step="1" value="1" />
              </label>

              <button id="clearReference" class="soft-button hidden" type="button">
                <span aria-hidden="true">×</span>
                <span>清空参考图</span>
              </button>
            </div>

            <div id="referenceStrip" class="reference-strip hidden"></div>
          </div>

          <button id="generateButton" class="generate-button" type="submit">
            <span aria-hidden="true">✦</span>
            <span>生成</span>
          </button>
        </form>
      </section>

      <div id="toast" class="toast hidden" role="status"></div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
