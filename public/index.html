<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Image2 Studio</title>
    <script>
      (() => {
        const theme = localStorage.getItem("image2-theme") || "light";
        document.documentElement.dataset.theme = theme;
      })();
    </script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="主导航">
        <div class="logo">
          <span class="logo-mark">I2</span>
          <span>Image2</span>
        </div>

        <nav class="nav-stack">
          <button class="nav-item" type="button" title="发现">
            <span aria-hidden="true">⌕</span>
            <span>发现</span>
          </button>
          <button class="nav-item active" type="button" title="生成">
            <span aria-hidden="true">✦</span>
            <span>生成</span>
          </button>
          <button class="nav-item" type="button" title="资产">
            <span aria-hidden="true">▣</span>
            <span>资产</span>
          </button>
          <button class="nav-item" type="button" title="历史">
            <span aria-hidden="true">◷</span>
            <span>历史</span>
          </button>
        </nav>

        <div class="nav-footer">
          <button class="icon-button" type="button" title="通知">◌</button>
          <button class="icon-button" type="button" title="菜单">☰</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Image2 Studio</p>
            <h1>生成历史</h1>
          </div>
          <div class="topbar-actions">
            <a class="pay-button" href="https://pay.ldxp.cn/shop/2C8QL88T" target="_blank" rel="noreferrer">
              <span aria-hidden="true">＋</span>
              <span>购买点数</span>
            </a>
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="切换深色模式">
              <span class="theme-orb" aria-hidden="true"></span>
              <span id="themeLabel">深色模式</span>
            </button>
            <button id="clearHistoryButton" class="theme-toggle hidden" type="button">
              <span aria-hidden="true">⌫</span>
              <span>清空本地历史</span>
            </button>
            <button id="accountButton" class="status-pill account-button" type="button" aria-expanded="false" aria-controls="accountPanel">
              <span class="status-dot"></span>
              <span id="accountButtonText">未登录</span>
            </button>
          </div>
        </header>

        <section class="local-notice" aria-label="本地保存说明">
          生成图片仅保存在当前浏览器本地，不会云端保存。清除浏览器数据、更换设备或更换浏览器后历史可能丢失，请及时下载重要图片。
        </section>

        <section id="historyFeed" class="history-feed" aria-label="生成历史"></section>

        <section id="emptyState" class="empty-state">
          <div class="empty-card">
            <span class="empty-icon">✦</span>
            <h2>开始一次新的图片生成</h2>
            <p>生成后的图片会保存在当前浏览器的本地历史中，方便你继续编辑和复用。</p>
          </div>
        </section>
      </main>

      <section class="composer" aria-label="生成控制">
        <form id="generateForm" class="composer-card">
          <label id="uploadTile" class="upload-tile" title="上传参考图">
            <input id="referenceInput" type="file" accept="image/*" multiple />
            <span id="uploadIcon" aria-hidden="true">+</span>
          </label>

          <div class="prompt-zone">
            <div class="prompt-top">
              <div id="referenceStrip" class="reference-strip hidden"></div>
              <textarea
                id="prompt"
                name="prompt"
                rows="3"
                placeholder="请输入你的创意，例如：雨后城市里的未来感产品海报，干净构图，高级广告摄影"
                required
              ></textarea>
            </div>

            <div class="control-row">
              <div class="ratio-control">
                <button id="ratioButton" class="ratio-button" type="button" aria-expanded="false">
                  <span id="ratioIcon" class="ratio-icon auto" aria-hidden="true"></span>
                  <span id="ratioLabel">智能比例</span>
                  <span aria-hidden="true">⌃</span>
                </button>
                <div id="ratioPanel" class="ratio-panel hidden">
                  <p>图片比例</p>
                  <div id="ratioOptions" class="ratio-options" aria-label="图片比例"></div>
                </div>
              </div>

              <select id="quality" name="quality" aria-label="图片质量">
                <option value="medium">medium</option>
                <option value="low">low</option>
                <option value="high">high</option>
              </select>

              <label class="count-control">
                <span>数量</span>
                <input id="countInput" type="number" min="1" step="1" value="1" />
              </label>

              <button id="clearReference" class="soft-button hidden" type="button">
                <span aria-hidden="true">×</span>
                <span>清空参考图</span>
              </button>
            </div>
          </div>

          <button id="generateButton" class="generate-button" type="submit">
            <span aria-hidden="true">✦</span>
            <span>生成</span>
          </button>
        </form>
      </section>

      <section id="accountPanel" class="account-panel hidden" aria-label="账号登录">
        <div class="panel-backdrop" data-close-account></div>
        <div class="account-popover">
          <div class="account-panel-head">
            <div>
              <p class="eyebrow">账号</p>
              <h2 id="accountPanelTitle">邮箱登录</h2>
            </div>
            <button id="closeAccountPanel" class="icon-button" type="button" aria-label="关闭">×</button>
          </div>

          <div id="loginFields" class="account-panel-body">
            <label class="account-control">
              <span>邮箱</span>
              <input id="emailInput" type="email" autocomplete="email" placeholder="you@example.com" />
            </label>
            <label id="codeControl" class="account-control hidden">
              <span>验证码</span>
              <input id="codeInput" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="6 位数字" />
            </label>
            <div class="panel-actions">
              <button id="sendCodeButton" class="soft-button" type="button">
                <span aria-hidden="true">✉</span>
                <span>发送验证码</span>
              </button>
              <button id="loginButton" class="soft-button hidden" type="button">
                <span aria-hidden="true">✓</span>
                <span>登录</span>
              </button>
            </div>
          </div>

          <div id="accountFields" class="account-panel-body hidden">
            <div class="account-summary">
              <span class="status-dot"></span>
              <div>
                <strong id="accountEmail">未登录</strong>
                <span id="accountCredits">0 点</span>
              </div>
            </div>
            <label id="giftControl" class="account-control">
              <span>礼品卡</span>
              <input id="giftKeyInput" type="text" autocomplete="off" placeholder="gift_..." />
            </label>
            <div class="panel-actions">
              <button id="redeemButton" class="soft-button" type="button">
                <span aria-hidden="true">＋</span>
                <span>兑换</span>
              </button>
              <button id="logoutButton" class="soft-button" type="button">
                <span aria-hidden="true">↥</span>
                <span>退出</span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section id="imagePreview" class="image-preview hidden" aria-label="图片预览" aria-modal="true" role="dialog">
        <div class="preview-backdrop" data-close-preview></div>
        <div class="preview-stage">
          <img id="previewImage" src="" alt="放大的生成结果" draggable="false" />
        </div>
        <div class="preview-toolbar" aria-label="预览控制">
          <button id="previewZoomOut" class="preview-tool" type="button" aria-label="缩小">−</button>
          <button id="previewZoomReset" class="preview-tool preview-scale" type="button">100%</button>
          <button id="previewZoomIn" class="preview-tool" type="button" aria-label="放大">＋</button>
        </div>
        <button id="closeImagePreview" class="preview-close" type="button" aria-label="关闭预览">×</button>
      </section>

      <div id="toast" class="toast hidden" role="status"></div>
    </div>

    <script type="module" src="/app.js?v=20260511-auto-reference-mode"></script>
  </body>
</html>
